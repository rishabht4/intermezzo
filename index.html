<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>intermezzo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .serif { font-family: 'EB+Garamond', serif; }
        .input-line { border: none; border-bottom: 1px solid #e5e7eb; outline: none; background: transparent; transition: border-color 0.3s; }
        .input-line:focus { border-bottom: 1px solid #111; }
        #card-container { transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-white text-stone-900 min-h-screen flex items-center justify-center overflow-x-hidden">

    <div id="login-overlay" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50 transition-opacity duration-700">
        <h1 class="text-xl font-light tracking-[0.4em] mb-16 text-stone-400 lowercase">intermezzo</h1>
        <div class="w-40">
            <input type="password" id="password-input" autocomplete="off" class="input-line w-full py-2 text-center text-stone-800" onkeypress="if(event.key === 'Enter') checkPassword()">
        </div>
    </div>

    <main id="main-content" class="hidden max-w-4xl w-full px-6 md:px-12 opacity-0 transition-opacity duration-1000">
        
        <nav class="fixed top-8 left-0 w-full px-6 md:px-12 z-40">
            <div class="max-w-4xl mx-auto flex justify-end">
                <button id="view-toggle" onclick="toggleView()" class="text-[10px] uppercase tracking-[0.2em] text-stone-400 hover:text-black transition-colors">
                    View Archive
                </button>
            </div>
        </nav>

        <div id="card-view" class="min-h-[60vh] flex flex-col justify-center py-20">
            <div id="card-container" class="max-w-2xl mx-auto text-center md:text-left">
                <div id="card-source-container" class="text-[10px] uppercase tracking-[0.3em] text-stone-400 mb-10">
                    <span id="card-source"></span>
                </div>
                <h2 id="card-content" class="serif text-3xl md:text-5xl leading-[1.4] text-stone-800 mb-10"></h2>
                <div class="w-12 h-[1px] bg-stone-200 mb-10 mx-auto md:ml-0"></div>
                <p id="card-meaning" class="serif italic text-xl md:text-2xl text-stone-500 leading-relaxed"></p>
            </div>
        </div>

        <div id="table-view" class="hidden py-24">
            <input type="text" id="search-input" onkeyup="filterTable()" placeholder="search archive..." 
                   class="input-line w-full mb-12 py-2 text-stone-500 serif italic text-lg">
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-[0.2em] text-stone-400 border-b border-stone-100">
                            <th class="pb-4 font-light">Content</th>
                            <th class="pb-4 font-light">Meaning</th>
                            <th class="pb-4 font-light hidden md:table-cell">Source</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="serif text-stone-700 divide-y divide-stone-50"></tbody>
                </table>
            </div>
        </div>

        <footer id="card-nav" class="fixed bottom-8 left-0 w-full px-6 md:px-12">
            <div class="max-w-2xl mx-auto flex justify-between items-center text-stone-400 font-light text-[10px] tracking-[0.2em]">
                <button onclick="prevCard()" class="hover:text-black transition-colors py-4 uppercase">prev</button>
                <span id="card-counter">0 / 0</span>
                <button onclick="nextCard()" class="hover:text-black transition-colors py-4 uppercase">next</button>
            </div>
        </footer>
    </main>

    <script>
        const CONFIG = {
            PASSWORD: "gaia", 
            CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS382Z5xOFf9V2-I7lTU74eeUFAzy-ueMnc5SowyT_TwWy5fmIV5uWOCOc7_f1S3o-Rew8Kr_B4n0xa/pub?output=csv"
        };

        let deck = [];
        let currentIndex = 0;
        let isTableView = false;

        window.onload = fetchData;

        async function fetchData() {
            try {
                const response = await fetch(CONFIG.CSV_URL);
                const data = await response.text();
                parseCSV(data);
            } catch (error) { console.error("Data fetch error:", error); }
        }

        function parseCSV(text) {
            const rows = text.split(/\r?\n/).slice(1); 
            deck = rows.map(row => {
                const parts = row.match(/(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g);
                if (parts && parts.length >= 3) {
                    return {
                        content: parts[0].replace(/^"|"$/g, "").trim(),
                        meaning: parts[1].replace(/^"|"$/g, "").trim(),
                        source: parts[2].replace(/^"|"$/g, "").trim()
                    };
                }
                return null;
            }).filter(item => item !== null);
            
            populateTable();
            shuffleDeck();
            renderCard(true);
        }

        function shuffleDeck() {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        function checkPassword() {
            if (document.getElementById('password-input').value === CONFIG.PASSWORD) {
                document.getElementById('login-overlay').classList.add('hidden');
                const main = document.getElementById('main-content');
                main.classList.remove('hidden');
                setTimeout(() => main.style.opacity = 1, 50);
            } else {
                alert("incorrect passphrase.");
            }
        }

        function toggleView() {
            isTableView = !isTableView;
            document.getElementById('card-view').classList.toggle('hidden', isTableView);
            document.getElementById('card-nav').classList.toggle('hidden', isTableView);
            document.getElementById('table-view').classList.toggle('hidden', !isTableView);
            document.getElementById('view-toggle').innerText = isTableView ? "back to cards" : "view archive";
        }

        function populateTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = deck.map(item => {
                const sourceHTML = item.source.startsWith('http') 
                    ? `<a href="${item.source}" target="_blank" class="underline underline-offset-2">link</a>` 
                    : item.source;
                return `
                    <tr>
                        <td class="py-6 pr-4 align-top leading-relaxed w-1/3 md:w-auto">${item.content}</td>
                        <td class="py-6 pr-4 align-top italic text-stone-500 leading-relaxed">
                            ${item.meaning}
                            <div class="md:hidden mt-2 text-[9px] uppercase tracking-widest text-stone-400">${sourceHTML}</div>
                        </td>
                        <td class="py-6 align-top hidden md:table-cell text-[10px] uppercase tracking-wider text-stone-400">${sourceHTML}</td>
                    </tr>`;
            }).join('');
        }

        function filterTable() {
            const query = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('#table-body tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none';
            });
        }

        function renderCard(isInitial = false) {
            if (deck.length === 0) return;
            const card = deck[currentIndex];
            const updateFields = () => {
                document.getElementById('card-content').innerText = card.content;
                document.getElementById('card-meaning').innerText = card.meaning;
                const sourceEl = document.getElementById('card-source');
                sourceEl.innerHTML = card.source.startsWith('http') 
                    ? `<a href="${card.source}" target="_blank" class="underline underline-offset-4 hover:text-stone-800">view source</a>` 
                    : card.source;
                document.getElementById('card-counter').innerText = `${currentIndex + 1} / ${deck.length}`;
            };

            if (isInitial) updateFields();
            else {
                document.getElementById('card-container').style.opacity = 0;
                setTimeout(() => { updateFields(); document.getElementById('card-container').style.opacity = 1; }, 250);
            }
        }

        function nextCard() { if (currentIndex < deck.length - 1) { currentIndex++; renderCard(); } }
        function prevCard() { if (currentIndex > 0) { currentIndex--; renderCard(); } }
    </script>
</body>
</html>
